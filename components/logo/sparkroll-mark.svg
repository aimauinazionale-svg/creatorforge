<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="sr-bg" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="sr-spark" x1="12" y1="7" x2="22" y2="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff7ed"/>
      <stop offset="0.45" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="sr-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#sr-bg)"/>
  <!-- Film strip frame -->
  <rect x="5" y="7" width="22" height="18" rx="2" stroke="#fff" stroke-opacity="0.22" stroke-width="0.75" fill="none"/>
  <!-- Sprocket holes (roll) -->
  <rect x="6.25" y="8.25" width="1.5" height="1.5" rx="0.35" fill="#fff" fill-opacity="0.55"/>
  <rect x="6.25" y="11.5" width="1.5" height="1.5" rx="0.35" fill="#fff" fill-opacity="0.45"/>
  <rect x="6.25" y="14.75" width="1.5" height="1.5" rx="0.35" fill="#fff" fill-opacity="0.45"/>
  <rect x="6.25" y="18" width="1.5" height="1.5" rx="0.35" fill="#fff" fill-opacity="0.45"/>
  <rect x="6.25" y="21.25" width="1.5" height="1.5" rx="0.35" fill="#fff" fill-opacity="0.55"/>
  <rect x="24.25" y="8.25" width="1.5" height="1.5" rx="0.35" fill="#fff" fill-opacity="0.55"/>
  <rect x="24.25" y="11.5" width="1.5" height="1.5" rx="0.35" fill="#fff" fill-opacity="0.45"/>
  <rect x="24.25" y="14.75" width="1.5" height="1.5" rx="0.35" fill="#fff" fill-opacity="0.45"/>
  <rect x="24.25" y="18" width="1.5" height="1.5" rx="0.35" fill="#fff" fill-opacity="0.45"/>
  <rect x="24.25" y="21.25" width="1.5" height="1.5" rx="0.35" fill="#fff" fill-opacity="0.55"/>
  <!-- Rolling film waves -->
  <path d="M9 12.5c2.2-1.4 4.4-1.4 6.6 0s4.4 1.4 6.6 0" stroke="#fff" stroke-width="1.35" stroke-linecap="round" fill="none" stroke-opacity="0.85"/>
  <path d="M9 19.5c2.2-1.4 4.4-1.4 6.6 0s4.4 1.4 6.6 0" stroke="#fff" stroke-width="1.35" stroke-linecap="round" fill="none" stroke-opacity="0.55"/>
  <!-- Central spark / lightning -->
  <path d="M16 9.5 13.2 16h2.4L14.8 22.5 19.2 15h-2.3L16 9.5Z" fill="url(#sr-spark)" filter="url(#sr-glow)"/>
  <path d="M16 9.5 13.2 16h2.4L14.8 22.5 19.2 15h-2.3L16 9.5Z" stroke="#fff" stroke-opacity="0.35" stroke-width="0.4" fill="none"/>
</svg>
