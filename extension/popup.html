<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CreatorForge</title>
    <link rel="stylesheet" href="styles/popup.css" />
  </head>
  <body>
    <header class="cf-popup-header">
      <svg class="cf-popup-logo" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <defs>
          <linearGradient id="cf-popup-grad" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
            <stop stop-color="#8b5cf6" />
            <stop offset="0.5" stop-color="#d946ef" />
            <stop offset="1" stop-color="#fbbf24" />
          </linearGradient>
        </defs>
        <rect width="32" height="32" rx="8" fill="url(#cf-popup-grad)" />
        <path d="M9 22V10h4.2c2.4 0 3.9 1.3 3.9 3.2 0 1.4-.7 2.4-1.9 2.9l2.6 5.9h-2.5l-2.3-5.4H11.4V22H9zm2.4-7.4h1.7c1.1 0 1.7-.6 1.7-1.5s-.6-1.4-1.7-1.4h-1.7v2.9zM20.2 22l3.8-12h2.3L23.5 22h-3.3z" fill="white" />
      </svg>
      <div>
        <h1 class="cf-popup-title" data-i18n="creatorForge">CreatorForge</h1>
        <p class="cf-popup-subtitle" data-i18n="popupSubtitle">YouTube creator toolkit</p>
      </div>
    </header>

    <div class="cf-popup-card" id="page-status">
      <span class="cf-popup-card-label" data-i18n="currentPage">Current page</span>
      <span class="cf-popup-card-value" id="page-type" data-i18n="checking">Checking…</span>
    </div>

    <div class="cf-popup-card cf-popup-card--hidden" id="video-card">
      <span class="cf-popup-card-label" data-i18n="videoAnalysis">Video analysis</span>
      <a class="cf-popup-link" id="video-link" href="#" target="_blank" rel="noreferrer" data-i18n="openSeoLab">Open SEO Lab →</a>
    </div>

    <a class="cf-btn cf-btn--primary" id="dashboard" href="#" target="_blank" rel="noreferrer" data-i18n="openDashboard">Open Dashboard</a>
    <a class="cf-btn cf-btn--ghost" id="options" href="options.html" data-i18n="extensionSettings">Extension Settings</a>

    <p class="cf-popup-footer" id="status" data-i18n="loading">Loading…</p>

    <script src="lib/i18n.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
